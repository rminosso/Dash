<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V-OOH: Login</title>
  <link rel="stylesheet" href="./assets/style/styleLogin.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>

  <div class="container-fluid">
    <div class="row vh-100">
      <div class="col-md-7 left-side d-none justify-content-start align-items-start d-md-flex purple_bg_log_reg">
        <a href="index.html">
          <button class="btn-back">&lt;</button>
        </a>
      </div>

      <div class="col-md-5 right-side">
        <div class="login-box">
          <h3 class="mb-2 fw-bold">Bem Vindo!</h3>
          <p class="text-secondary mb-4">Insira os dados de sua conta</p>

          <div class="mb-3">
            <label class="form-label">E-mail:</label>
            <input type="text" id="ipt_email" class="input-class" placeholder="Insira seu email" />
          </div>

          <div class="mb-3">
            <label class="form-label">Senha:</label>
            <input type="password" id="ipt_senha" class="input-class" placeholder="Insira sua senha" />
          </div>

          <div class="divider"></div>

          <button onclick="entrar()" class="btn btn-light w-100 btn-login">
            Entrar
          </button>

          <p class="text-center text-secondary mt-4 signup-text">
            Não possui conta?
            <a href="cadastroUser.html">Cadastre-se</a>
          </p>
          <p class="text-center text-secondary mt-4 signup-text">
            Empresa não cadastrada?
            <a href="cadastroEmpresa.html">Cadastre</a>
          </p>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

<script>
  function entrar() {
    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;

    fetch("/usuarios/autenticar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
     }) 
      .then(function (resposta) {
        console.log("ESTOU NO THEN DO entrar()!");
        console.log(resposta);
        if (resposta.ok) {
          console.log(resposta);
          resposta.json().then((json) => {
            // console.log(json);
            console.log(JSON.stringify(json));
            console.log(json.email);
            console.log(json.nome);
            sessionStorage.EMAIL_USUARIO = json.email;
            sessionStorage.NOME_USUARIO = json.nome;
          setTimeout(() => {
            window.location = "homeDashboard.html"
          }, 1000);
        });
      }
      else {
          alert("Erro ao realizar login!");
        }
      })
      .catch(function (erro) {
        console.log(erro);
      });

    return false;
  }
</script>
