        function desativarPopUp() {
            body_html.style.overflowy = "auto"

        async function buscarComponentes() {
            var requisicaoBuscaComponentes = await fetch(`/componente/buscar`)
            console.log(requisicaoBuscaComponentes);

            if (requisicaoBuscaComponentes.status == 200) {
                var requisicaoJson = await requisicaoBuscaComponentes.json()
                if (requisicaoJson.length > 1) {
                    for (var i = 0; i < requisicaoJson.length; i++) {
                        var componenteAtual = requisicaoJson[i];
                        id_cont_checkboxes.innerHTML += `
                        <div class="cont-check">
                            <label for="limite_${componenteAtual.nome}">${componenteAtual.nome} - ${componenteAtual.descricao} (${componenteAtual.medida})</label>
                            <input type="checkbox" name="check_${componenteAtual.nome}" class="check" id="">
                            <input type="text" placeholder="Limite:" class="input" id="limite_${componenteAtual.nome}">
                            </div>
                            `
                    }
                } else {
                    id_cont_checkboxes.innerHTML = `
                        <div class="cont-check">
                            <label for="limite_cpu">${requisicaoJson.nome} - ${requisicaoJson.descricao} (${requisicaoJson.unidadeMedida})</label>
                            <input type="checkbox" name="check_${requisicaoJson.nome}" class="check" id="">
                            <input type="text" placeholder="Limite:" class="input" id="limite_${requisicaoJson.nome}">
                        </div>
                    `
                }
            } else {
                alert("Erro aop buscar componentes!")
            }


        }
