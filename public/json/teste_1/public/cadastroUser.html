<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V-OOH: Cadastro Usuário</title>
  <link rel="icon" href="./assets/img/logo.png" />
  <link rel="stylesheet" href="./assets/style/styleRegisterUser.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
  <div class="container-fluid">
    <div class="row vh-100">
      <div class="col-md-5 left-side">
        <div class="register-box">
          <h3 class="fw-bold text-center">Crie sua conta</h3>
          <p class="text-secondary m-0 text-center">Informe seus dados</p>
          <div class="cont_inputs">
            <label for="ipt_username" class="labels-ipt">Nome: </label>
            <input type="text" id="ipt_username" class="input-class" placeholder="Insira seu nome " />

            <label for="ipt_cpf" class="labels-ipt">CPF: </label>
            <input type="text" maxlength="11" id="ipt_cpf" class="input-class" placeholder="Ex 00000000000 " />

            <label for="ipt_email" class="labels-ipt">E-mail: </label>
            <input type="text"  id="ipt_email" class="input-class" placeholder="Insira seu email " />

            <label for="ipt_senha" class="labels-ipt">Senha: </label>
            <input id="ipt_senha" type="password" class="input-class"
              placeholder="Insira uma senha " />
              
            <label for="ipt_confirmacao" class="labels-ipt">Confirmação de senha: </label>
            <input id="ipt_confirmacao" type="password" class="input-class"
              placeholder="Confirmar senha " />

            <label for="ipt_token" class="labels-ipt">Token: </label>
            <input id="ipt_token" type="text"
              class="input-class" placeholder="Insira o token da empresa " />
          </div>
          <button onclick="cadastrar()" class="btn-light w-100 btn-register">
            Criar conta
          </button>

          <div class="redirect">
            <p class="text-center text-secondary login-text">
              Já possui conta?
              <a href="login.html">Entrar</a>
            </p>
            <p class="text-center text-secondary login-text">
              Empresa não cadastrada?
              <a href="cadastroEmpresa.html">Cadastre</a>
            </p>
          </div>

        </div>
      </div>
      <div class="col-md-7 right-side d-none d-md-flex">
        <div class="cont-btn">
          <a href="index.html">
            <button class="btn-back">&lt;</button>
          </a>
        </div>
        <div class="cont-passo-a-passo">
          <h3 class="text-start mb-3">Comece <br> conosco!</h3>
          <div class="cont-card">
            <div
              class="d-flex p-3 rounded-4 justify-content-xl-evenly justify-content-center flex-column second-card cards">
              <h5 class=" number-text text-circle-secondary">1</h5>
              <h5 class="text_card">Cadastrar empresa</h5>
            </div>
            <div
              class="d-flex p-3 rounded-4 bg-white text-black justify-content-xl-evenly justify-content-center flex-column cards">
              <h5 class="number-text bg-black text-white">2</h5>
              <h5 class="text_card">Criar conta com o token</h5>
            </div>
            <div
              class="d-flex p-3 rounded-4 justify-content-xl-evenly justify-content-center flex-column second-card cards">
              <h5 class=" number-text text-circle-secondary">3</h5>
              <h5 class="text_card">Configurar máquinas</h5>
            </div>
            <div
              class="d-flex p-3 rounded-4 justify-content-xl-evenly justify-content-center flex-column second-card cards">
              <h5 class=" number-text text-circle-secondary">4</h5>
              <h5 class="text_card">Analisar dados na dashboard</h5>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>

      async function consultaToken(token) {
        var consulta = await fetch(`/empresa/verificar-token/${token}`)
          .then(resposta => resposta.json())
          .then(function (resposta) {
            if (!resposta) {
              console.log("Erro ao gerar token!");
              throw resposta
            }
            console.log(resposta);

            return resposta[0]
          })
          .catch(function (error) {
            console.log("Erro ao gerar token!");
            return 0
          })

        return consulta
      }
      async function cadastrar() {
        var nomeVar = ipt_username.value;
        var emailVar = ipt_email.value;
        var cpfVar = ipt_cpf.value;

        var senhaVar = ipt_senha.value;
        var confirmacaoSenhaVar = ipt_confirmacao.value;
        var tokenVar = ipt_token.value

        var senhaMaiuscula = senhaVar.toUpperCase();
        var incluiMaiuscula = senhaVar != senhaMaiuscula;

        var senhaMinuscula = senhaVar.toLowerCase();
        var incluiMinuscula = senhaVar != senhaMinuscula;

        if (
          nomeVar == "" ||
          emailVar == "" ||
          senhaVar == "" ||
          confirmacaoSenhaVar == "" || 
          cpfVar == ""
        ) {
          alert("Todos campos devem estar preenchidos");
          return false;
        } else if (
          senhaVar.length < 8 ||
          confirmacaoSenhaVar != senhaVar ||
          incluiMaiuscula == false ||
          incluiMinuscula == false
        ) {
          alert(
            "Coloque uma senha forte. A senha deve ter 8 ou mais caracteres, 1 letra maiúscula e 1 minúscula.",
          );
          return false;
        } else if (!emailVar.includes("@") || !emailVar.endsWith(".com")) {
          alert("O email deve incluir '@' e finalizar com '.com'");
          return false;
        } else {
          var consultarToken = await consultaToken(tokenVar)
          if (consultarToken) {
            var fkEmpresaServer = consultarToken.idEmpresa
            fetch("/usuarios/cadastrar", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                nomeServer: nomeVar,
                fkEmpresaServer: fkEmpresaServer,
                emailServer: emailVar,
                senhaServer: senhaVar,
                cpfServer: cpfVar
              }),
            })
              .then(function (resposta) {
                if (resposta.ok && resposta.status == 200) {
                  alert("Usuário cadastrado com sucesso!")
                  setTimeout(() => {
                    window.location = "login.html";
                  }, 1000);
                } else {
                  throw "Erro ao realizar cadastro!";
                }
              })
              .catch(function (erro) {
                console.log(`#ERRO: ${erro}`);
              });

            return false;
          }
        }

      }
    </script>
</body>

</html>
