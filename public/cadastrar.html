            <!-- Input senha -->
            <div class="inputs">
              <input id="codigo" placeholder="ABC-123-DEF" type="text">
            </div>

          </div>
        </div>

        <div style="display: none;" id="cardErro" class="cardErro">
            <span id="mensagem_erro"></span>
        </div>

        <button class="button_cadastrar" onclick="entrar()">
          Cadastrar
        </button>

        <div class="rodape_box_login">
                <span>
                    Já possui uma conta?
                    <a style="color: var(--purple);" href="./login.html"> Faça Login</a>
                </span>
          <a href="">Contatar Suporte</a>
        </div>
            </div>
      </div>
    
  </div>

</html>

<script>
function entrar() {
        var emailVar = email.value;
        var codigoVar = codigo.value;

        if (emailVar == "" || codigoVar == "") {
          cardErro.style.display = 'flex';  
          mensagem_erro.innerHTML = "Preencha todos os campos para prosseguir";
            return;
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", codigoVar);
        console.log("TO AQUI");

        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                codigoServer: codigoVar

            })
        })
            .then(resposta => {
                console.log("ESTOU NO THEN DO entrar()!")
                console.log(resposta)
                if (resposta.ok) {
                    console.log(resposta);

                    resposta.json().then((json) => {
                        console.log(json);
                        console.log("ur ur");

                        console.log(JSON.stringify(json));
                        sessionStorage.EMAIL_USUARIO = json.email;
                        sessionStorage.ID_USUARIO = json.id;
                        sessionStorage.FKEMPRESA = json.fkEmpresa;
                        window.location = "./finalizarcadastro.html";

                        setTimeout(function () {
                        }, 1000);

                    });

                } else {
                    
                    cardErro.style.display = 'flex';  
                    mensagem_erro.innerHTML = "Email ou código de ativação incorretos";
                    console.log("Houve um erro ao tentar realizar o login!");

                    resposta.text().then(texto => {
                        console.error(texto);
                        //finalizarAguardar(texto);
                    });
                }

            }).catch(function (erro) {
                console.log(erro);
            })
    }

    function sumirMensagem() {

    }

</script>
