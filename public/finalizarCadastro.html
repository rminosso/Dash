<script>
    var senhaValida = false;

    function validarSenha() {
        senha = input_senha.value;

        var veriTam = false;
        var veriNum = false;
        var veriCarc = false;

        if (senha.length >= 8) {
            span_tamanho.style.color = "#2BAA39";
            checktamanho.style.color = "#2BAA39"
            checktamanho.style.display = "flex"
            veriTam = true;
        } else {
            span_tamanho.style.color = "red";
            checktamanho.style.display = "none";
            veriTam = false;
        }

        if (senha.includes(0) || senha.includes(1) || senha.includes(2) || senha.includes(3) ||
            senha.includes(4) || senha.includes(5) || senha.includes(6) ||
            senha.includes(7) || senha.includes(8) || senha.includes(9)) {

            span_num.style.color = "#2BAA39";
            checknum.style.color = "#2BAA39";
            checknum.style.display = "flex";
            veriNum = true;

        } else {
            span_num.style.color = "red";
            checknum.style.display = "none";
            veriNum = false;
        }

        if (senha.includes('!') || senha.includes('%') || senha.includes('*') || senha.includes('.') ||
            senha.includes('&') || senha.includes('#') || senha.includes('$')) {

            span_caracEsp.style.color = "#2BAA39";
            checkesp.style.color = "#2BAA39";
            checkesp.style.display = "flex"
            veriCarc = true;

        } else {
            span_caracEsp.style.color = "red";
            checkesp.style.display = "none"
            veriCarc = false;
        }

        if (veriTam == false || veriNum == false || veriCarc == false) {
            senhaValida = false;
        } else {
            senhaValida = true;
        }
    }

    function entrar() {
        var nomeVar = nome.value;
        var senhaVar = input_senha.value;
        var senhaconfVar = senhaconf.value
        var idUsuarioVar = sessionStorage.ID_USUARIO

        if (nomeVar == "" || senhaVar == "" || senhaconfVar == "") {
            cardErro.style.display = 'flex';
            mensagem_erro.innerHTML = "Preencha todos os campos para prosseguir";
            return;
        }

        else if (!senhaValida) {
            cardErro.style.display = "flex";
            mensagem_erro.innerHTML = "A senha não atende aos requisitos.";
            return false;
        }

        else if (senhaVar != senhaconfVar) {
            cardErro.style.display = "flex";
            mensagem_erro.innerHTML = "A confirmação da senha está diferente.";
            return false;
        }

        console.log("FORM NOME: ", nomeVar);
        console.log("FORM SENHA: ", senhaVar);
        console.log("TO AQUI");

        fetch("/usuarios/finalizarCadastro", {
            method: "PATCH",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nomeServer: nomeVar,
                senhaServer: senhaVar,
                idServer: idUsuarioVar
            })
        })
