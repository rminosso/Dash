<script>

    usuarionome.innerHTML = sessionStorage.NOME_USUARIO
    usuariocargo.innerHTML = sessionStorage.TIPO_USUARIO

    var idServidor = "";

 function cadastrarEmpresa() {
        var nomeVar = input_nome.value;
        var resVar = input_res.value;
        var cnpjVar = input_cnpj.value;

        if (nomeVar == '' || resVar == '' || cnpjVar == '') {
            alert("Preencha todos os campos para prosseguir");
            return;
        }

        fetch("/empresa/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nome: nomeVar,
                res: resVar,
                cnpj: cnpjVar
            })
        })
        .then(resposta => {
            if (resposta.ok) {
                resposta.json().then((json) => {
                    console.log("Resultado do cadastro:", json);
                    
                    sessionStorage.FKEMPRESA = json.insertId

                    alert("Empresa cadastrada com sucesso! Agora vamos ao endereço.");
                    

                    document.getElementById('meuDialogo').close();
                    document.getElementById('dialogEnd').showModal();
                });
            } else {
                resposta.text().then(texto => {
                    console.error("Erro no cadastro:", texto);
                    alert("Erro ao cadastrar: " + texto);
                });
            }
        })
        .catch(erro => {
            console.log("Erro na requisição:", erro);
        });
    }

    function cadastrarEnd() {

        cepVar = input_cep.value;
        logVar = input_logradouro.value;
        numVar = input_numero.value;
        compVar = input_complemento.value;
        bairroVar = input_bairro.value;
        cidadeVar = input_cidade.value;
        ufVar = input_uf.value;


        if (compVar == '') {
            compVar = 'Sem complemento';
        }

        if (cepVar == '' || logVar == '' || numVar == '' ||
            bairroVar == '' || cidadeVar == '' || ufVar == '') {
            alert("Preencha todos os campos para prosseguir")

        } else {
            fetch("/empresa/cadastrarEnd", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    fkEmpresa: sessionStorage.FKEMPRESA,
                    cep: cepVar,
                    logradouro: logVar,
                    numero: numVar,
                    complemento: compVar,
                    bairro: bairroVar,
                    cidade: cidadeVar,
                    uf: ufVar
                })

            })
                .then(resposta => {
                    console.log("ESTOU NO THEN DO cadastrarFuncionario()!")
                    console.log(resposta)
                    if (resposta.ok) {

                        resposta.json().then((json) => {
                            console.log(json);

                            console.log(JSON.stringify(json));


                            setTimeout(function () {
                                alert("Cadastro realizado com sucesso!")
                                document.getElementById('dialogEnd').close();
                            }, 1000);

                        });

                    } else {
                        console.log("Houve um erro ao realizar o cadastro!");

                        resposta.text().then(texto => {
                            console.error(texto);
                        });
                    }
                }).catch(function (erro) {
                    console.log(erro);
                })

        }

    }

        function consultaCEP() {
        let cep = document.getElementById('input_cep').value;
        cep = cep.replace(/\D/g, '');

        if (cep !== "") {
            var url = `https://viacep.com.br/ws/${cep}/json/`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (!data.erro) {
                        document.getElementById('input_logradouro').value = data.logradouro;
                        document.getElementById('input_bairro').value = data.bairro;
                        document.getElementById('input_cidade').value = data.localidade;
                        document.getElementById('input_uf').value = data.uf;

                        document.getElementById('input_logradouro').readOnly = true;
                        document.getElementById('input_bairro').readOnly = true;
                        document.getElementById('input_cidade').readOnly = true;
                        document.getElementById('input_uf').readOnly = true;
                    } else {
                        alert("CEP não encontrado.");
                        limpaFormulario();
                    }
                })
                .catch(error => {
                    console.error('Erro ao consultar CEP:', error);
                    alert("Erro ao buscar o CEP. Tente novamente.");
                });
        }
    }

    function limpaFormulario() {

        document.getElementById('input_logradouro').value = "";
        document.getElementById('input_bairro').value = "";
        document.getElementById('input_cidade').value = "";
        document.getElementById('input_uf').value = "AC";

        document.getElementById('input_logradouro').readOnly = false;
        document.getElementById('input_bairro').readOnly = false;
        document.getElementById('input_cidade').readOnly = false;
        document.getElementById('input_uf').disabled = false;
    }

</script>
