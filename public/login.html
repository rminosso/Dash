<script>
  function verificar() {
    if (sessionStorage.EMAIL_USUARIO != undefined) {
      window.location = "./homeDashboard.html";
    }
  }

  function entrar() {
    var emailVar = email.value;
    var senhaVar = senha.value;

    if (emailVar == "" || senhaVar == "") {
      cardErro.style.display = "flex";
      mensagem_erro.innerHTML = "Preencha todos os campos para prosseguir";
      //finalizarAguardar();
      return;
    }

    console.log("FORM LOGIN: ", emailVar);
    console.log("FORM SENHA: ", senhaVar);
    console.log("TO AQUI");

    fetch("/usuarios/autenticar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    })
      .then((resposta) => {
        console.log("ESTOU NO THEN DO entrar()!");
        console.log(resposta);
        if (resposta.ok) {
          console.log(resposta);

          resposta.json().then((json) => {
            console.log(json);
            console.log("ur ur");

            console.log(JSON.stringify(json));
            sessionStorage.EMAIL_USUARIO = json.email;
            sessionStorage.NOME_USUARIO = json.nome;
            sessionStorage.ID_USUARIO = json.id;
            sessionStorage.FKEMPRESA = json.fkEmpresa;
            sessionStorage.TIPO_USUARIO = json.tipo;

            if (sessionStorage.TIPO_USUARIO != "Suporte") {
              window.location = "./dashboard/dashboard.html";
            } else {
              window.location = "./dashboard/dashboardSuporte.html";
            }
            setTimeout(function () {
              // window.location = "./cadastro_funcionario.html";
            }, 1000); // apenas para exibir o loading
          });
        } else {
          cardErro.style.display = "flex";
          mensagem_erro.innerHTML = "Login ou senha inválidos";

          console.log("Houve um erro ao tentar realizar o login!");

          resposta.text().then((texto) => {
            console.error(texto);
            finalizarAguardar(texto);
          });
        }
      })
      .catch(function (erro) {
        console.log(erro);
      });
  }

  function sumirMensagem() {

</script>
