    <div class="container-fluid">
      <div class="row vh-100">
        <div class="col-md-5 left-side">
          <div class="register-box">
            <h3 class="mb-2 fw-bold">Create account</h3>
            <p class="text-secondary mb-4">Please fill in your information</p>

            <div class="mb-3">
              <input
                type="text"
                id="ipt_username"
                class="form-control"
                placeholder="Enter username"
              />
            </div>

            <div class="mb-3">
              <input
                type="text"
                id="ipt_nome_completo"
                class="form-control"
                placeholder="Enter full name"
              />
            </div>

            <div class="mb-3">
              <input
                type="text"
                id="ipt_email"
                class="form-control"
                placeholder="Enter e-mail"
              />
            </div>

            <div class="mb-3">
              <input
                id="ipt_senha"
                type="password"
                class="form-control"
                placeholder="Enter password"
              />
            </div>

            <div class="mb-3">
              <input
                id="ipt_confirmacao"
                type="password"
                class="form-control"
                placeholder="Confirm password"
              />
            </div>

            <div class="divider"></div>

            <button
              onclick="cadastrar()"
              class="btn btn-light w-100 btn-register"
            >
              Register
            </button>

            <p class="text-center text-secondary mt-4 login-text">
              Already have an account?
              <a href="login.html">Sign in</a>
            </p>
          </div>
        </div>
        <div class="col-md-7 right-side d-none d-md-flex">
          <div>
            <h1>
              join<br />
              build<br />
              <span class="bold-text">grow.</span>
            </h1>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function cadastrar() {
        var usernameVar = ipt_username.value;
        var nomeCompletoVar = ipt_nome_completo.value;
        var emailVar = ipt_email.value;
        var senhaVar = ipt_senha.value;
        var confirmacaoSenhaVar = ipt_confirmacao.value;

        var senhaMaiuscula = senhaVar.toUpperCase();
        var incluiMaiuscula = senhaVar != senhaMaiuscula;

        var senhaMinuscula = senhaVar.toLowerCase();
        var incluiMinuscula = senhaVar != senhaMinuscula;

        if (
          usernameVar == "" ||
          nomeCompletoVar == "" ||
          emailVar == "" ||
          senhaVar == "" ||
          confirmacaoSenhaVar == ""
        ) {
          alert("Todos campos devem estar preenchidos");
          return false;
        } else if (
          senhaVar.length < 8 ||
          confirmacaoSenhaVar != senhaVar ||
          incluiMaiuscula == false ||
          incluiMinuscula == false
        ) {
          alert(
            "Coloque uma senha forte. A senha deve ter 8 ou mais caracteres, 1 letra maiúscula e 1 minúscula.",
          );
          return false;
        } else if (!emailVar.includes("@") || !emailVar.endsWith(".com")) {
          alert("O email deve incluir '@' e finalizar com '.com'");
          return false;
        }

        fetch("/usuarios/cadastrar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            usernameServer: usernameVar,
            nomeCompletoServer: nomeCompletoVar,
            emailServer: emailVar,
            senhaServer: senhaVar,
          }),
        })
          .then(function (resposta) {
            if (resposta.ok) {
              setTimeout(() => {
                window.location = "login.html";
              }, 1000);
            } else {
              throw "Erro ao realizar cadastro!";
            }
          })
          .catch(function (erro) {
            console.log(`#ERRO: ${erro}`);
          });

        return false;
      }
    </script>
