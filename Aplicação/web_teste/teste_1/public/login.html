<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOOH LOGIN</title>
    <link rel="stylesheet" href="./assets/style/styleLogin.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav
      class="navbar navbar-expand-lg bg-white border-bottom sticky-top nav-blur"
    >
      <div class="container py-2">
        <a
          class="navbar-brand d-flex align-items-center gap-2 fw-bold"
          href="./index.html"
        >
          <span class="brand-mark" aria-hidden="true">
            <img
              src="./assets/img/logo.png"
              style="max-width: 4rem; height: 36px"
            />
          </span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
          aria-controls="nav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav mx-auto gap-lg-3">
            <li class="nav-item"><a class="nav-link" href="./index.html">Home</a></li>
            <li class="nav-item">
              <a class="nav-link" href="./index.html">O que é DOOH?</a>
            </li>
            <li class="nav-item"><a class="nav-link" href="./index.html">Sobre nós</a></li>
            <li class="nav-item">
              <a class="nav-link" href="./index.html">Nossa solução</a>
            </li>
          </ul>

          <a class="btn btn-primary btn-pill px-4" href="./cadastro.html"
            >Cadastrar</a
          >
        </div>
      </div>
    </nav>
    <div class="container-fluid">
      <div class="row vh-100">
        <div class="col-md-7 left-side d-none d-md-flex purple_bg_log_reg">
          <div>
            <h1>
              visible<br />
              measurable<br />
              <span class="bold-text">reliable.</span>
            </h1>
          </div>
        </div>

        <div class="col-md-5 right-side">
          <div class="login-box">
            <h3 class="mb-2 fw-bold">Sign in account</h3>
            <p class="text-secondary mb-4">Please sign in to your account</p>

            <div class="mb-3">
              <label class="form-label">E-mail</label>
              <input
                type="text"
                id="ipt_email"
                class="form-control"
                placeholder="Enter your e-mail"
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input
                type="password"
                id="ipt_senha"
                class="form-control"
                placeholder="Enter your password"
              />
            </div>

            <div class="divider"></div>

            <button onclick="entrar()" class="btn btn-light w-100 btn-login">
              Sign in
            </button>

            <p class="text-center text-secondary mt-4 signup-text">
              Don’t have a account?
              <a href="cadastro.html">Sign up</a>
            </p>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

<script>
  function entrar() {
    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;

    fetch("/usuarios/autenticar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        if (resposta.ok) {
          resposta.json().then((json) => {
            sessionStorage.EMAIL_USUARIO = json.email;
            sessionStorage.USERNAME = json.username;
            sessionStorage.NOME_COMPLETO = json.nome_completo;
          });
        } else {
          alert("Erro ao realizar login!");
        }
      })
      .catch(function (erro) {
        console.log(erro);
      });

    return false;
  }
</script>
