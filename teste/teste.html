<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <form id="form">
        <input type="file" name="file" id="file">
        <button type="button" id="btn">Enviar</button>
    </form>

    <div class="" id="obs"></div>

<script>
    const form = document.getElementById('form');
    const file = document.getElementById('file');
    const btn = document.getElementById('btn');

    btn.addEventListener('click', () => {

        if (!file) {
            alert("Não há documento!");
        }

        let nomeArquivo = file.files[0].name;
        console.log(nomeArquivo);

        console.log("Exensão", nomeArquivo[1]);

        obs.innerHTML = `Extensão: ${nomeArquivo.split('.')[1]}`;
    })
</script>
</body>
</html>
